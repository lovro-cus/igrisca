name: Web BFF CI

on:
  push:
    paths:
      - "web-bff/**"
  pull_request:
    paths:
      - "web-bff/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-bff

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web-bff/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

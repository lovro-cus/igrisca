name: Availability Service CI

on:
  push:
    paths:
      - "availability-service/**"
  pull_request:
    paths:
      - "availability-service/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: availability-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate proto files
        run: python generate_proto.py

      - name: Run tests
        run: pytest tests/ -v --tb=short

  docker-publish:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./availability-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/availability-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/availability-service:${{ github.sha }}

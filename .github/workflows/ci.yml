name: Booking Service CI

on:
  push:
    paths:
      - "booking-service/**"
  pull_request:
    paths:
      - "booking-service/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: booking-service

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: booking-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

name: Mobile BFF CI

on:
  push:
    paths:
      - "mobile-bff/**"
  pull_request:
    paths:
      - "mobile-bff/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-bff

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Run tests
        run: go test ./...

  docker-publish:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./mobile-bff
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/mobile-bff:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/mobile-bff:${{ github.sha }}
